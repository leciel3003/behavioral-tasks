<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>행동심리검사</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --ink: #172326;
      --muted: #667276;
      --line: #d6ddda;
      --primary: #236f6b;
      --primary-dark: #18534f;
      --secondary: #e8f1ef;
      --accent: #ba6a2d;
      font-family: "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink); }
    button, input { font: inherit; -webkit-tap-highlight-color: transparent; }
    button { cursor: pointer; touch-action: manipulation; }
    button:focus-visible, input:focus-visible { outline: 3px solid rgba(35,111,107,.25); outline-offset: 2px; }

    .app { width: min(700px, calc(100% - 28px)); margin: 0 auto; padding: 30px 0 40px; }
    header { margin-bottom: 28px; text-align: center; }
    h1 { margin: 0 0 8px; font-size: clamp(32px, 7vw, 48px); line-height: 1.1; letter-spacing: 0; }
    .subtitle { margin: 0; color: var(--muted); font-size: 20px; line-height: 1.5; }
    .identity { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    label { color: var(--muted); font-size: 16px; font-weight: 600; white-space: nowrap; }
    input { width: 110px; min-height: 52px; padding: 12px 14px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); color: var(--ink); text-align: center; margin: 0; }
    .button-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 24px; }
    .button-grid + .button-grid { margin-top: 34px; }
    .single-task-options { display: none; }
    .task-button { min-height: 160px; padding: 18px 14px; border: 1px solid #b8bec0; border-radius: 10px; background: linear-gradient(180deg, #f0f2f2 0%, #d9ddde 100%); color: #303638; font-weight: 700; line-height: 1.35; text-align: center; display: grid; align-content: center; justify-items: center; box-shadow: 0 7px 0 #aeb5b7, 0 12px 18px rgba(45, 52, 54, .16); transition: transform 100ms ease, box-shadow 100ms ease, background 100ms ease; }
    .task-button strong { display: block; margin-bottom: 8px; font-size: clamp(21px, 4vw, 28px); }
    .task-button small { display: block; color: var(--muted); font-size: 13px; font-weight: 400; }
    .task-button.primary { background: linear-gradient(180deg, #f0f2f2 0%, #d9ddde 100%); color: #303638; }
    .task-button.primary small { color: var(--muted); }
    .task-button.single { min-height: 160px; padding: 18px 14px; background: linear-gradient(180deg, #f0f2f2 0%, #d9ddde 100%); border-color: #b8bec0; }
    .task-button[data-entry="combined_coin_first"] { border-color: #b8bec0 !important; }
    .task-button:hover { transform: translateY(-2px); background: linear-gradient(180deg, #f7f8f8 0%, #e0e4e5 100%); box-shadow: 0 9px 0 #aeb5b7, 0 15px 22px rgba(45, 52, 54, .2); }
    .task-button:active { transform: translateY(6px); box-shadow: 0 1px 0 #aeb5b7, 0 5px 9px rgba(45, 52, 54, .12); }
    .status { min-height: 24px; margin: 18px 0 0; color: var(--muted); font-size: 13px; line-height: 1.45; text-align: center; }
    .completion-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: #ffffff;
      color: #111111;
      font-size: clamp(25px, 4.8vw, 42px);
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
      white-space: pre-line;
    }
    @media (max-width: 480px) {
      .app {
        width: calc(100% - 24px);
        padding-top: 20px;
        padding-bottom: 28px;
      }

      header {
        margin-bottom: 20px;
      }

      h1 {
        font-size: clamp(28px, 9vw, 38px);
      }

      .subtitle {
        font-size: 16px;
        line-height: 1.45;
      }

      .identity {
        margin-bottom: 20px;
      }

      label {
        font-size: 15px;
      }

      input {
        min-height: 50px;
      }

      .button-grid {
        gap: 14px;
      }

      .button-grid + .button-grid,
      .single-task-options {
        margin-top: 22px;
      }

      .task-button,
      .task-button.single {
        min-height: 142px;
        padding: 16px 8px;
      }

      .task-button strong {
        font-size: 19px;
        line-height: 1.25;
      }

      .task-button small {
        font-size: 11px;
        line-height: 1.3;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>행동심리검사</h1>
      <p class="subtitle">참가자 ID를 입력한 뒤 수행할 과제를 선택해 주세요.</p>
    </header>

    <section class="identity" aria-labelledby="id-label">
      <label id="id-label" for="participantId">참가자 ID</label>
      <input id="participantId" type="text" autocomplete="off" placeholder="ID를 입력하세요">
    </section>

    <section aria-label="통합 과제 선택">
      <div class="button-grid">
        <button class="task-button primary" type="button" data-entry="combined_paint_first" data-tasks="paint,star-picking-task">
          <strong>물감채우기<br>+ 별 따기</strong>
          <small>물감채우기 후 별 따기</small>
        </button>
        <button class="task-button primary" type="button" data-entry="combined_coin_first" data-tasks="star-picking-task,paint">
          <strong>별 따기<br>+ 물감채우기</strong>
          <small>별 따기 후 물감채우기</small>
        </button>
      </div>
    </section>

    <section class="single-task-options" aria-label="단독 과제 선택">
      <div class="button-grid">
        <button class="task-button single" type="button" data-entry="paint_only" data-tasks="paint">
          <strong>물감채우기</strong>
        </button>
        <button class="task-button single" type="button" data-entry="coin_only" data-tasks="star-picking-task">
          <strong>별 따기</strong>
        </button>
      </div>
    </section>

    <p id="status" class="status" role="status" aria-live="polite"></p>
  </main>

  <script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycby46Dm-RuaKJSuUzKQdZozu0iGzRQYFH3VqARbz66e5XUmzgWROSuhhC6BA975gyMt4/exec";
    const participantId = document.getElementById("participantId");
    const status = document.getElementById("status");

    function makeId(prefix) {
      if (crypto && typeof crypto.randomUUID === "function") return `${prefix}-${crypto.randomUUID()}`;
      return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function begin(entryCondition, tasks) {
      const id = participantId.value.trim();
      if (!id) {
        participantId.focus();
        status.textContent = "참가자 ID를 먼저 입력해 주세요.";
        return;
      }

      const workflow = {
        participant_id: id,
        entry_condition: entryCondition,
        workflow_session_id: makeId("workflow"),
        sheet_url: SHEET_URL,
        auto_upload: true,
        tasks,
        current_index: 0,
        started_at: new Date().toISOString()
      };
      sessionStorage.setItem("behavioralTaskWorkflow", JSON.stringify(workflow));
      localStorage.setItem("behavioralTaskParticipantId", id);
      window.location.href = `${tasks[0]}.html?entry=${encodeURIComponent(entryCondition)}`;
    }

    function showCompletionScreen() {
      sessionStorage.removeItem("behavioralTaskWorkflow");
      document.body.innerHTML = `<main class="completion-screen" role="status" aria-live="polite">실험이 종료되었습니다.<br>감사합니다.</main>`;
    }

    if (new URLSearchParams(location.search).get("completed") === "1") {
      showCompletionScreen();
    } else {
      participantId.value = localStorage.getItem("behavioralTaskParticipantId") || "";
      status.textContent = "";
      document.querySelectorAll("[data-entry]").forEach((button) => {
        button.addEventListener("click", () => begin(button.dataset.entry, button.dataset.tasks.split(",")));
      });
      participantId.addEventListener("input", () => { status.textContent = ""; });
    }
  </script>
</body>
</html>
